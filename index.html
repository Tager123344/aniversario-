<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Sueño 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #1a001f, #000);
    font-family: 'Segoe UI';
}

#btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    background: #ff4da6;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

#texto {
    position: absolute;
    width: 100%;
    top: 40%;
    text-align: center;
    font-size: 30px;
    color: white;
    opacity: 0;
    transition: 2s;
}
</style>
</head>

<body>

<div id="texto"></div>
<button id="btn">💖 Entrar al sueño 💖</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,2000);
camera.position.z = 500;

let renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// partículas tipo pétalos
let geo = new THREE.BufferGeometry();
let arr = [];

for(let i=0;i<2000;i++){
    arr.push(
        (Math.random()-0.5)*1000,
        Math.random()*800,
        (Math.random()-0.5)*1000
    );
}

geo.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));
let mat = new THREE.PointsMaterial({color:0xff99cc, size:3});
let petals = new THREE.Points(geo,mat);
scene.add(petals);

// corazón
let heartGeo = new THREE.SphereGeometry(80,32,32);
let heartMat = new THREE.MeshBasicMaterial({color:0xff3366});
let heart = new THREE.Mesh(heartGeo,heartMat);
heart.visible = false;
scene.add(heart);

// audio
let audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");

let frases = [
    "No fue casualidad...",
    "Fue destino...",
    "Fue magia...",
    "Fuiste tú...",
    "Y desde entonces...",
    "Mi vida cambió...",
    "Feliz aniversario 💖",
    "30/10/2025 ❤️"
];

let i = 0;

document.getElementById("btn").onclick = ()=>{
    audio.play();
    document.getElementById("btn").style.display="none";
    siguiente();
};

function siguiente(){
    if(i>=frases.length) return;

    let t = document.getElementById("texto");
    t.innerHTML = frases[i];
    t.style.opacity = 1;

    setTimeout(()=>{
        t.style.opacity = 0;
        i++;
        setTimeout(siguiente,2000);
    },4000);
}

// animación
function animate(){
    requestAnimationFrame(animate);

    let time = Date.now()*0.001;

    // caída de pétalos
    let pos = geo.attributes.position.array;
    for(let i=0;i<2000;i++){
        pos[i*3+1] -= 1.5;
        if(pos[i*3+1] < -200){
            pos[i*3+1] = 800;
        }
    }
    geo.attributes.position.needsUpdate = true;

    // corazón aparece después
    if(i > 4){
        heart.visible = true;
        heart.scale.x = 1 + Math.sin(time*3)*0.2;
        heart.scale.y = heart.scale.x;
        heart.rotation.y += 0.02;
    }

    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
