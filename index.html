<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        font-family: "Arial", sans-serif;
    }

    .scene {
        width: 350px;
        height: 400px;
        background: #e8dfd5;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
    }

    /* suelo */
    .ground {
        position: absolute;
        bottom: 40px;
        width: 100%;
        height: 2px;
        background: #333;
    }

    /* tronco */
    .trunk {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 120px;
        background: #8b5a2b;
        border-radius: 5px;
    }

    /* ramas */
    .branch {
        position: absolute;
        width: 80px;
        height: 6px;
        background: #8b5a2b;
        top: -20px;
        left: -30px;
        transform-origin: left center;
    }

    .branch.left {
        transform: rotate(-30deg);
    }

    .branch.right {
        transform: rotate(30deg);
        left: -20px;
    }

    /* flores */
    .flower {
        position: absolute;
        width: 10px;
        height: 10px;
        background: yellow;
        border-radius: 50%;
        box-shadow: 0 0 8px yellow;
        animation: bloom 3s infinite ease-in-out;
    }

    /* distribución random de flores */
    .flowers {
        position: absolute;
        top: -120px;
        left: -80px;
        width: 200px;
        height: 200px;
    }

    .flower:nth-child(1) { top: 20px; left: 50px; }
    .flower:nth-child(2) { top: 40px; left: 100px; }
    .flower:nth-child(3) { top: 80px; left: 70px; }
    .flower:nth-child(4) { top: 60px; left: 30px; }
    .flower:nth-child(5) { top: 100px; left: 120px; }
    .flower:nth-child(6) { top: 140px; left: 60px; }
    .flower:nth-child(7) { top: 30px; left: 140px; }
    .flower:nth-child(8) { top: 110px; left: 20px; }

    @keyframes bloom {
        0%,100% {
            transform: scale(1);
            opacity: 0.8;
        }
        50% {
            transform: scale(1.5);
            opacity: 1;
        }
    }

    /* texto estilo "Te Amo" */
    .text {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 24px;
        color: #444;
        font-family: "Courier New", monospace;
    }
</style>
</head>
<body>

<div class="scene">
    <div class="text">Te Amo 🌼</div>

    <div class="trunk">
        <div class="branch left">
            <div class="flowers">
                <div class="flower"></div>
                <div class="flower"></div>
                <div class="flower"></div>
                <div class="flower"></div>
            </div>
        </div>

        <div class="branch right">
            <div class="flowers">
                <div class="flower"></div>
                <div class="flower"></div>
                <div class="flower"></div>
                <div class="flower"></div>
            </div>
        </div>
    </div>

    <div class="ground"></div>
</div>

</body>
</html>
