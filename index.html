<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:320px;
    height:420px;
    background:#e9dfd4;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

/* suelo */
.ground{
    position:absolute;
    bottom:50px;
    width:100%;
    height:2px;
    background:#222;
}

/* tronco */
.trunk{
    position:absolute;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);
    width:16px;
    height:150px;
    background:#7a4b2a;
    border-radius:6px;
}

/* texto */
.title{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    font-family:monospace;
    letter-spacing:3px;
    color:#333;
}

/* flores */
.flower{
    position:absolute;
    width:6px;
    height:6px;
    background:#ffd54f;
    border-radius:50%;
    box-shadow:0 0 8px #ffeb3b;
    opacity:0;
    transform:scale(0);
    animation:grow 2s forwards;
}

@keyframes grow{
    to{
        opacity:1;
        transform:scale(1.4);
    }
}

/* brillo continuo */
.flower::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    box-shadow:0 0 10px yellow;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{opacity:.5;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<div class="card" id="scene">
    <div class="title">TE AMO</div>
    <div class="trunk"></div>
    <div class="ground"></div>
</div>

<script>
const scene = document.getElementById("scene");

/* función para crear flores */
function createFlower(x, y, delay){
    const f = document.createElement("div");
    f.className = "flower";
    f.style.left = x + "px";
    f.style.top = y + "px";
    f.style.animationDelay = delay + "s";
    scene.appendChild(f);
}

/* generar forma tipo árbol */
function generateTree(){

    const centerX = 160;
    const baseY = 220;

    let count = 0;

    for(let i=0;i<120;i++){

        // forma tipo copa (semicírculo irregular)
        let angle = Math.random() * Math.PI;
        let radius = 20 + Math.random()*100;

        let x = centerX + Math.cos(angle) * radius;
        let y = baseY - Math.sin(angle) * radius;

        // ruido para hacerlo orgánico
        x += (Math.random() - 0.5) * 30;
        y += (Math.random() - 0.5) * 30;

        createFlower(x, y, count * 0.02);
        count++;
    }

    /* algunas flores cayendo (extra realismo) */
    for(let i=0;i<20;i++){
        let x = centerX + (Math.random()-0.5)*200;
        let y = baseY + Math.random()*100;

        createFlower(x, y, 2 + i*0.05);
    }
}

generateTree();
</script>

</body>
</html>
