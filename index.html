<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversario - Natasha</title>
    <style>
        /* =========================================
           1. ESTILOS VISUALES (CSS)
           =========================================
        */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #2c010c 0%, #000000 100%); /* Fondo profundo y lujoso */
            font-family: 'Georgia', serif; 
            color: #d4af37; /* Dorado metálico */
            cursor: default; 
        }

        /* Título superior sutil */
        #tituloSuperior { 
            position: absolute; 
            top: 40px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(20px, 4vw, 28px); 
            letter-spacing: 3px;
            font-weight: 300;
            color: rgba(212, 175, 55, 0.6); /* Oro suave */
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); 
            z-index: 10; 
            pointer-events: none; 
        }

        /* Botón de reproducción: El marcapáginas dorado */
        #musicBtn { 
            position: absolute; 
            bottom: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 15px 35px; 
            border: 2px solid #d4af37; 
            border-radius: 50px; 
            background: linear-gradient(135deg, #440a1a 0%, #000000 100%); 
            color: #ffd700; 
            font-size: 20px; 
            font-weight: bold;
            cursor: pointer; 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); 
            z-index: 100; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(5px);
        }

        #musicBtn:hover { 
            transform: translateX(-50%) scale(1.1); 
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8); 
            background: #ff4d6d;
            color: white;
            border-color: #ff4d6d;
        }

        /* Texto de invitación al viaje */
        #textoBoton {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: clamp(16px, 3vw, 20px);
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            pointer-events: none;
            z-index: 100;
        }

        /* Mensaje final que aparece en la última página */
        #mensajeFinal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; /* Empieza oculto */
            z-index: 2000;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* La tarjeta del mensaje final */
        .cardFinal {
            background: linear-gradient(135deg, #2c010c 0%, #160106 100%);
            padding: 50px;
            border-radius: 20px;
            border: 3px solid #d4af37;
            box-shadow: 0 0 60px #ff4d6d;
            max-width: 80%;
            font-size: clamp(24px, 5vw, 36px);
            line-height: 1.6;
            color: #ffd700;
            text-shadow: 0 0 15px #ff4d6d;
        }

    </style>
</head>
<body>

<div id="tituloSuperior">Aniversario - Natasha</div>

<div id="mensajeFinal">
    <div class="cardFinal">
        Gracias por escribir esta historia conmigo.<br><br>
        <strong style="color: white; text-shadow: 0 0 20px white;">Te amo mi gordita preciosa ❤️</strong>
    </div>
</div>

<button id="musicBtn">Empezar Nuestro Viaje 💖</button>
<div id="textoBoton">Un recorrido por nuestros recuerdos</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * =========================================
 * 2. LÓGICA DEL LIBRO 3D (JAVASCRIPT)
 * =========================================
 */

// --- Variables de Estado y Configuración ---
let despierto = false;
let t = 0;
let audio, clickSound;

// --- Configuración Core de Three.js ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
// Vista de primer plano, íntima y cercana
camera.position.set(0, 0, 500); 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- 1. Creación del Libro de Terciopelo y Nácar ---
const libro = new THREE.Group();
const loader = new THREE.TextureLoader();

// A. La Portada: Terciopelo Rosa Pastel
const coverGeometry = new THREE.BoxGeometry(200, 260, 10);
const coverMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xffb7c5, // Rosa pastel terciopelo
    roughness: 0.9, 
    metalness: 0.1 
});
const cover = new THREE.Mesh(coverGeometry, coverMaterial);
cover.position.set(100, 0, 0); // Pivote en el lomo
libro.add(cover);

// B. El Lomo: Oro Rosa con Filigrana
const spineGeometry = new THREE.CylinderGeometry(15, 15, 260, 32, 1, true, Math.PI, Math.PI);
const spineMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xd4af37, // Oro rosa base
    metalness: 0.9, 
    roughness: 0.2, 
    side: THREE.DoubleSide 
});
const spine = new THREE.Mesh(spineGeometry, spineMaterial);
spine.position.set(0, 0, 0);
libro.add(spine);

// C. Las Páginas: Nácar Iridiscente
const pagesGeometry = new THREE.BoxGeometry(195, 255, 8);
const pagesMaterial = new THREE.MeshStandardMaterial({ 
    color: 0xfffafa, // Nácar base
    roughness: 0.2, 
    metalness: 0.1,
    transparent: true,
    opacity: 0.95
});
const pages = new THREE.Mesh(pagesGeometry, pagesMaterial);
pages.position.set(100, 0, -5); // Un poco atrás de la portada
libro.add(pages);

scene.add(libro);

// --- 2. Los Grabados de los Corazones (Nácar y Oro Rosa) ---
const hearts = [];
const heartShape = new THREE.Shape();
heartShape.moveTo( 5, 5 );
heartShape.bezierCurveTo( 5, 5, 4, 0, 0, 0 );
heartShape.bezierCurveTo( -6, 0, -6, 7, -6, 7 );
heartShape.bezierCurveTo( -6, 11, -3, 15.4, 5, 19 );
heartShape.bezierCurveTo( 12, 15.4, 16, 11, 16, 7 );
heartShape.bezierCurveTo( 16, 7, 16, 0, 10, 0 );
heartShape.bezierCurveTo( 7, 0, 5, 5, 5, 5 );

const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 2, bevelEnabled: true, bevelSize: 0.5 });
const heartMat = new THREE.MeshStandardMaterial({ 
    color: 0xd4af37, // Oro rosa grabado
    emissive: 0xff0044, // Brillo de nácar iridiscente
    emissiveIntensity: 0.3,
    metalness: 0.8,
    roughness: 0.2
});

// Colocamos los corazones dentro del libro (en las páginas)
const posCorazones = [
    {x: 60, y: 80}, {x: 140, y: 80},
    {x: 40, y: 0}, {x: 100, y: 0}, {x: 160, y: 0},
    {x: 60, y: -80}, {x: 140, y: -80}
];

posCorazones.forEach(pos => {
    const mesh = new THREE.Mesh(heartGeo, heartMat);
    mesh.rotation.z = Math.PI; // Voltear
    mesh.scale.set(1.5, 1.5, 1.5);
    mesh.position.set(pos.x, pos.y, -3); // Justo sobre la página de nácar
    libro.add(mesh);
    hearts.push(mesh);
});

// --- 3. Iluminación y Efectos ---
// Luz puntual cálida (como de una vela) para resaltar el terciopelo y el nácar
const light = new THREE.PointLight(0xfff8e1, 2, 1000);
light.position.set(100, 100, 300);
scene.add(light);

// Luz ambiental suave para no perder detalles
scene.add(new THREE.AmbientLight(0x404040, 1.5));

// Raycaster para la interacción de clics (no 3D, pero para el control)
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

/**
 * --- Gestión de Eventos y Audio ---
 */

document.getElementById("musicBtn").onclick = function() {
    // Si la música ya está sonando, no hacemos nada más
    if(audio) return;

    // Inicializar el audio de fondo y el sonido de clic
    audio = new Audio("music.mp3"); 
    audio.loop = true;
    clickSound = new Audio("click.mp3");

    // Iniciar la música
    audio.play();

    // Efectos visuales de inicio
    this.style.opacity = "0";
    document.getElementById("textoBoton").style.opacity = "0";
    setTimeout(() => {
        this.style.display = "none";
        document.getElementById("textoBoton").style.display = "none";
    }, 1000);

    // Activamos la animación
    despierto = true;
};

// Controlar el clic final en el corazón
window.addEventListener('click', (e) => {
    // Solo si el libro está abierto y hemos llegado al final
    if(despierto && libro.rotation.y > Math.PI * 0.4) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        ray.setFromCamera(mouse, camera);
        
        // Intersección con los corazones grabados
        const intersects = ray.intersectObjects(hearts);
        if(intersects.length > 0) {
            clickSound.currentTime = 0;
            clickSound.play();
            mostrarMensajeFinal();
        }
    }
});

function mostrarMensajeFinal() {
    const msg = document.getElementById("mensajeFinal");
    msg.style.display = "flex";
    setTimeout(() => msg.style.opacity = "1", 100);
}

/**
 * --- Bucle de Animación (60 FPS) ---
 */
function animate() {
    requestAnimationFrame(animate);
    
    // Si la música no ha empezado, el libro está quieto
    if(despierto) {
        t += 0.005;
        
        // Movimiento de deriva suave para que flote en el terciopelo del fondo
        libro.position.y = Math.sin(t) * 15;
        libro.position.x = Math.cos(t * 0.7) * 10;
        
        // --- 1. Apertura Cinemática del Libro ---
        // Se abre lentamente hasta quedar en ángulo
        if(libro.rotation.y < Math.PI * 0.45) {
            libro.rotation.y += 0.003;
        }

        // --- 2. Animación de los Grabados de Corazones ---
        // Brillo iridiscente de nácar que pulsa
        const iridiscencia = 0.3 + Math.sin(t * 2) * 0.1;
        heartMat.emissiveIntensity = iridiscencia;
        
        // Pequeño balanceo individual como si bailaran con la música
        hearts.forEach((h, i) => {
            h.rotation.y = Math.sin(t + i) * 0.05;
        });

        // La cámara se acerca sutilmente para la lectura
        if(camera.position.z > 400) camera.position.z -= 0.2;
    }

    renderer.render(scene, camera);
}

// Controlar el redimensionado de la ventana
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Iniciar animación
animate();

</script>
</body>
</html>
