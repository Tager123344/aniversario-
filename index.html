<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test 💖</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

#btn {
    margin-top: 200px;
    padding: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<button id="btn">▶️ Iniciar</button>
<h1 id="txt"></h1>

<script>

let audio = new Audio("music.mp3");

document.getElementById("btn").addEventListener("click", function() {

    audio.play().then(()=>{
        document.getElementById("txt").innerHTML = "💖 Funcionando 💖";
    }).catch(err=>{
        alert("Error con el audio: " + err);
    });

});

</script>

</body>
</html>
