<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aniversario - Natasha</title>
<style>
    body { margin: 0; overflow: hidden; background: radial-gradient(circle, #200122, #000000); font-family: 'Georgia', serif; }
    #titulo { position: absolute; top: 40px; width: 100%; text-align: center; font-size: 38px; color: #ffd700; text-shadow: 0 0 15px #ff4d6d; z-index: 10; pointer-events: none; letter-spacing: 2px; }
    
    #musicBtn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 18px 40px; border: 2px solid #ffd700; border-radius: 50px; background: rgba(255, 77, 109, 0.3); color: white; font-size: 22px; cursor: pointer; box-shadow: 0 0 20px #ff4d6d; z-index: 100; transition: 0.5s; backdrop-filter: blur(5px); }
    #musicBtn:hover { background: #ff4d6d; transform: translateX(-50%) scale(1.1); box-shadow: 0 0 40px #ffd700; }

    #mensajeFinal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 2000; justify-content: center; align-items: center; color: white; text-align: center; }
    .card { background: linear-gradient(135deg, #440a1a, #000000); padding: 50px; border-radius: 30px; border: 3px solid #ffd700; box-shadow: 0 0 50px #ff4d6d; max-width: 80%; }
    .card h1 { color: #ffd700; font-size: 45px; margin-bottom: 20px; }
    .card p { font-size: 24px; line-height: 1.6; }
</style>
</head>
<body>

<div id="titulo">✨ Feliz Aniversario, Mi Amor ✨</div>
<button id="musicBtn">Empezar Nuestro Viaje 💖</button>

<div id="mensajeFinal" onclick="this.style.display='none'">
    <div class="card">
        <h1>¡Feliz Aniversario! 🌹</h1>
        <p>Cada día a tu lado es mi regalo favorito.<br>
        Gracias por ser mi paz y mi alegría.<br><br>
        <strong style="color: #ff7ab6; font-size: 1.5em;">Te amo mi gordita preciosa ❤️</strong></p>
        <p style="font-size: 18px; margin-top: 30px;">(Toca para volver al universo)</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let despierto = false;
let t = 0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// SONIDOS
let audioBg;
const clickSound = new Audio("click.mp3");

// 1. EL CAMINO DE FOTOS (55 FOTOS EN ESPIRAL)
const photos = [];
const loader = new THREE.TextureLoader();
for(let i=1; i<=55; i++) {
    const pMat = new THREE.MeshBasicMaterial({ 
        map: loader.load(`foto${i}.jpg`), 
        side: THREE.DoubleSide, 
        transparent: true, 
        opacity: 0 
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), pMat);
    
    // Posición en espiral ascendente
    const angle = i * 0.5;
    const radius = 150 + (i * 5);
    mesh.position.set(Math.cos(angle) * radius, i * 15 - 400, Math.sin(angle) * radius);
    mesh.lookAt(0, mesh.position.y, 0);
    
    scene.add(mesh);
    photos.push(mesh);
}

// 2. PÉTALOS DE ROSA CAYENDO
const petalCount = 500;
const petalGeo = new THREE.BufferGeometry();
const petalPos = new Float32Array(petalCount * 3);
for(let i=0; i<petalCount*3; i++) petalPos[i] = (Math.random() - 0.5) * 1500;
petalGeo.setAttribute('position', new THREE.BufferAttribute(petalPos, 3));
const petalMat = new THREE.PointsMaterial({ color: 0xff4d6d, size: 4, transparent: true, opacity: 0.8 });
const petals = new THREE.Points(petalGeo, petalMat);
scene.add(petals);

// 3. GRAN CORAZÓN CENTRAL
const heartShape = new THREE.Shape();
heartShape.moveTo( 5, 5 );
heartShape.bezierCurveTo( 5, 5, 4, 0, 0, 0 );
heartShape.bezierCurveTo( -6, 0, -6, 7, -6, 7 );
heartShape.bezierCurveTo( -6, 11, -3, 15.4, 5, 19 );
heartShape.bezierCurveTo( 12, 15.4, 16, 11, 16, 7 );
heartShape.bezierCurveTo( 16, 7, 16, 0, 10, 0 );
heartShape.bezierCurveTo( 7, 0, 5, 5, 5, 5 );

const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 4, bevelEnabled: true, bevelSize: 1.5 });
const heartMat = new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xff0000, emissiveIntensity: 0.5 });
const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.rotation.z = Math.PI;
heartMesh.scale.set(8, 8, 8);
heartMesh.position.set(0, 500, 0); // Al final del camino
scene.add(heartMesh);

// LUCES
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(0, 500, 200);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040, 2));

// INTERACCIÓN
document.getElementById("musicBtn").onclick = function() {
    if(!audioBg) { audioBg = new Audio("music.mp3"); audioBg.loop = true; }
    audioBg.play();
    this.style.display = "none";
    despierto = true;
};

// CLICK EN FOTOS
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(photos.concat(heartMesh));
    
    if(intersects.length > 0) {
        clickSound.currentTime = 0;
        clickSound.play();
        if(intersects[0].object === heartMesh) {
            document.getElementById("mensajeFinal").style.display = "flex";
        }
    }
});

function animate() {
    requestAnimationFrame(animate);
    
    if(despierto) {
        t += 0.005;
        
        // Movimiento de cámara automático en espiral
        const camAngle = t * 0.5;
        const camRadius = 400 + Math.sin(t) * 100;
        camera.position.x = Math.cos(camAngle) * camRadius;
        camera.position.z = Math.sin(camAngle) * camRadius;
        camera.position.y = (t * 50) % 800 - 100; // Sube y baja por el camino
        camera.lookAt(0, camera.position.y + 50, 0);

        // Aparecer fotos y pétalos suavemente
        photos.forEach((p, i) => {
            if(p.material.opacity < 1) p.material.opacity += 0.01;
            p.rotation.y += 0.01;
        });

        // Caída de pétalos
        const positions = petalGeo.attributes.position.array;
        for(let i=1; i<positions.length; i+=3) {
            positions[i] -= 1.5;
            if(positions[i] < -500) positions[i] = 1000;
        }
        petalGeo.attributes.position.needsUpdate = true;

        // Latido del corazón final
        heartMesh.scale.setScalar(8 + Math.sin(t * 5) * 0.5);
        heartMesh.rotation.y += 0.02;
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
