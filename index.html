<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<style>
:root{
    --bg: #e9dfd4;
    --trunk: #7a4b2a;
    --flower: #ffd54f;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
}

/* tarjeta */
.card{
    width:320px;
    height:380px;
    background:var(--bg);
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

/* suelo */
.line{
    position:absolute;
    bottom:40px;
    width:100%;
    height:2px;
    background:#222;
}

/* tronco */
.trunk{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:18px;
    height:140px;
    background:var(--trunk);
    border-radius:5px;
}

/* ramas */
.branch{
    position:absolute;
    width:90px;
    height:6px;
    background:var(--trunk);
    top:30px;
    transform-origin:left center;
}

.branch.left{
    transform:rotate(-35deg);
    left:-20px;
}

.branch.right{
    transform:rotate(35deg);
    left:-10px;
}

/* flores (muchas y dispersas) */
.flower{
    position:absolute;
    width:8px;
    height:8px;
    background:var(--flower);
    border-radius:50%;
    box-shadow:0 0 6px #ffeb3b;
    animation:pop 2.5s infinite ease-in-out;
}

/* distribución tipo nube (clave para que se vea igual) */
.f1{ top:-80px; left:20px;}
.f2{ top:-100px; left:50px;}
.f3{ top:-120px; left:80px;}
.f4{ top:-90px; left:120px;}
.f5{ top:-60px; left:140px;}
.f6{ top:-30px; left:100px;}
.f7{ top:-50px; left:60px;}
.f8{ top:-20px; left:30px;}
.f9{ top:-140px; left:100px;}
.f10{ top:-110px; left:10px;}
.f11{ top:-130px; left:140px;}
.f12{ top:-70px; left:80px;}

@keyframes pop{
    0%,100%{ transform:scale(1); opacity:.8;}
    50%{ transform:scale(1.6); opacity:1;}
}

/* texto superior */
.title{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    font-size:22px;
    letter-spacing:2px;
    font-family:monospace;
    color:#333;
}
</style>

</head>

<body>

<div class="card">

    <div class="title">ALEX DEV</div>

    <div class="trunk">

        <div class="branch left">
            <div class="flower f1"></div>
            <div class="flower f2"></div>
            <div class="flower f3"></div>
            <div class="flower f4"></div>
            <div class="flower f5"></div>
            <div class="flower f6"></div>
        </div>

        <div class="branch right">
            <div class="flower f7"></div>
            <div class="flower f8"></div>
            <div class="flower f9"></div>
            <div class="flower f10"></div>
            <div class="flower f11"></div>
            <div class="flower f12"></div>
        </div>

    </div>

    <div class="line"></div>

</div>

</body>
</html>
