<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi Gordita ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Short+Stack&family=Gaegu:wght@700&display=swap" rel="stylesheet">

<style>
:root{
    --rojo:#ff1744;
    --amarillo:#ffd600;
    --negro:#1a1a1a;
}

/* 🌈 FONDO ANIMADO */
body{
    margin:0;
    font-family:'Short Stack', cursive;
    overflow:hidden;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    background: linear-gradient(270deg,#81d4fa,#ff8a80,#ffd180);
    background-size:600% 600%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* HEADER */
.header{
    background:white;
    width:100%;
    text-align:center;
    border-bottom:6px solid var(--negro);
    padding:15px;
    z-index:10;
}

/* GAME */
#game{
    position:relative;
    width:90%;
    max-width:500px;
    height:400px;
    background:white;
    border-radius:25px;
    border:5px solid var(--negro);
    margin-top:20px;
    overflow:hidden;
    box-shadow:10px 10px 0 var(--negro);
}

/* CORAZONES */
.heart{
    position:absolute;
    font-size:40px;
    cursor:pointer;
    transition:transform .2s;
    animation:float 2s infinite ease-in-out alternate;
}

.heart:hover{
    transform:scale(1.3);
}

@keyframes float{
    from{transform:translateY(0px);}
    to{transform:translateY(-15px);}
}

/* EXPLOSIÓN */
.boom{
    position:absolute;
    font-size:20px;
    color:var(--rojo);
    animation:boom 1s forwards;
    pointer-events:none;
}

@keyframes boom{
    0%{opacity:1; transform:scale(.5);}
    100%{opacity:0; transform:translateY(-80px) scale(2);}
}

/* PARTÍCULAS */
.particle{
    position:fixed;
    font-size:20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{transform:translateY(110vh);}
}

/* BOTÓN */
.btn{
    background:var(--rojo);
    color:white;
    border:none;
    padding:15px 40px;
    border-radius:50px;
    font-size:20px;
    cursor:pointer;
}

/* FINAL */
#final{
    display:none;
    background:white;
    padding:30px;
    border-radius:20px;
    border:5px solid var(--negro);
    max-width:500px;
    margin-top:20px;
    animation:pop .8s;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

.type{
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid black;
    animation:typing 4s steps(40,end), blink .7s infinite;
}

@keyframes typing{
    from{width:0;}
    to{width:100%;}
}

@keyframes blink{
    50%{border-color:transparent;}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="header">
<h1>🐾 5 MESES CONTIGO 🐾</h1>
</div>

<div id="game">
<div id="start" style="text-align:center; padding-top:120px;">
<h2>¿Lista mi gordita? 💖</h2>
<button class="btn" onclick="startGame()">JUGAR</button>
</div>
</div>

<div id="final">
<h2>💌 Para ti</h2>
<p class="type">
Desde el 30 de octubre todo cambió...
No necesito un mundo perfecto,
solo uno donde estés tú conmigo ❤️
</p>
</div>

<script>
const game = document.getElementById("game");
const music = document.getElementById("music");

let score = 0;

/* INICIAR */
function startGame(){
    document.getElementById("start").remove();
    music.play();
    spawn();
}

/* CREAR CORAZONES */
function spawn(){
    if(score>=10){
        end();
        return;
    }

    const h = document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";

    let x = Math.random()*(game.clientWidth-50);
    let y = Math.random()*(game.clientHeight-50);

    h.style.left=x+"px";
    h.style.top=y+"px";

    h.onclick=(e)=>{
        score++;

        // explosión
        const b = document.createElement("div");
        b.className="boom";
        b.innerText="💥";
        b.style.left=x+"px";
        b.style.top=y+"px";
        game.appendChild(b);

        setTimeout(()=>b.remove(),1000);
        h.remove();
        spawn();
    };

    game.appendChild(h);
}

/* FINAL */
function end(){
    game.style.display="none";
    document.getElementById("final").style.display="block";
    rain();
}

/* LLUVIA */
function rain(){
    setInterval(()=>{
        const p=document.createElement("div");
        p.className="particle";
        p.innerHTML="❤️";
        p.style.left=Math.random()*100+"vw";
        p.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),5000);
    },100);
}
</script>

</body>
</html>
