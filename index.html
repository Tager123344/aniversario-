<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Natasha ❤️</title>
    <style>
        /* Fondo de terciopelo rosa y estética de lujo */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle, #fff0f5 0%, #fbc2eb 100%); 
            font-family: 'Times New Roman', serif;
        }

        /* Botón central elegante */
        #btnIniciar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 50px;
            background: white;
            border: 2px solid #b76e79;
            color: #b76e79;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(183, 110, 121, 0.3);
            z-index: 100;
            transition: 0.5s;
        }

        #btnIniciar:hover {
            background: #b76e79;
            color: white;
            box-shadow: 0 15px 45px rgba(183, 110, 121, 0.5);
        }

        /* Frase final que aparece con la música */
        #fraseFinal {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-size: 35px;
            color: #b76e79;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: 3s;
            z-index: 10;
        }
    </style>
</head>
<body>

<button id="btnIniciar">Abrir mi regalo 💖</button>
<div id="fraseFinal">Te amo mi gordita preciosa ❤️</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let escena, camara, render, alhajero, tapaPivote;
    let corazones = [];
    let audio = new Audio("music.mp3"); // Carga tu música de 4 min
    let iniciado = false;

    function init() {
        escena = new THREE.Scene();
        camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camara.position.set(0, 40, 150);

        render = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        render.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(render.domElement);

        // Luces cálidas para efecto joya
        const luzSol = new THREE.DirectionalLight(0xffffff, 1);
        luzSol.position.set(5, 10, 7.5);
        escena.add(luzSol);
        escena.add(new THREE.AmbientLight(0xfff0f5, 0.8));

        // 1. Crear Alhajero (Base y Tapa)
        const materialOroRosa = new THREE.MeshStandardMaterial({ 
            color: 0xb76e79, metalness: 0.8, roughness: 0.2 
        });
        const materialNacar = new THREE.MeshStandardMaterial({ 
            color: 0xfffafa, roughness: 0.1 
        });

        // Base
        const baseGeo = new THREE.CylinderGeometry(50, 55, 20, 32);
        const base = new THREE.Mesh(baseGeo, materialNacar);
        escena.add(base);

        // Tapa con Pivote para abrir
        tapaPivote = new THREE.Group();
        tapaPivote.position.set(0, 10, -50); 
        const tapaGeo = new THREE.CylinderGeometry(55, 55, 5, 32);
        const tapa = new THREE.Mesh(tapaGeo, materialOroRosa);
        tapa.position.set(0, 2.5, 50);
        tapaPivote.add(tapa);
        escena.add(tapaPivote);

        // 2. Crear Corazones Flotantes
        const formaCorazon = new THREE.Shape();
        formaCorazon.moveTo(0, 0);
        formaCorazon.bezierCurveTo(0, 0, -5, 10, 0, 18);
        formaCorazon.bezierCurveTo(5, 25, 20, 15, 20, 15);
        formaCorazon.bezierCurveTo(20, 15, 35, 25, 40, 18);
        formaCorazon.bezierCurveTo(45, 10, 40, 0, 40, 0);
        formaCorazon.bezierCurveTo(40, 0, 40, -15, 20, -25);
        formaCorazon.bezierCurveTo(0, -15, 0, 0, 0, 0);

        const geoCorazon = new THREE.ExtrudeGeometry(formaCorazon, { depth: 2, bevelEnabled: true, bevelSize: 1 });
        
        for(let i=0; i<5; i++) {
            let c = new THREE.Mesh(geoCorazon, materialOroRosa);
            c.scale.set(0.8, 0.8, 0.8);
            c.rotation.x = Math.PI;
            c.position.set((i - 2) * 30, 10, (Math.random() - 0.5) * 20);
            escena.add(c);
            corazones.push(c);
        }

        animate();
    }

    function iniciar() {
        audio.play().catch(e => console.log("Error al reproducir audio"));
        document.getElementById("btnIniciar").style.display = "none";
        document.getElementById("fraseFinal").style.opacity = "1";
        iniciado = true;
    }

    function animate() {
        requestAnimationFrame(animate);
        let time = Date.now() * 0.002;

        if (iniciado) {
            // Abrir tapa lentamente
            if (tapaPivote.rotation.x > -Math.PI * 0.7) {
                tapaPivote.rotation.x -= 0.02;
            }

            // Movimiento de corazones "bailando" con la música
            corazones.forEach((c, i) => {
                c.position.y = 15 + Math.sin(time + i) * 10;
                c.rotation.y += 0.01;
            });
        }

        render.render(escena, camara);
    }

    document.getElementById("btnIniciar").addEventListener("click", iniciar);
    window.onload = init;
</script>

</body>
</html>
