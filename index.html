<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversario - Natasha</title>
    <style>
        /* =========================================
           1. ESTILOS VISUALES (CSS)
           =========================================
        */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; /* Fondo negro absoluto para que resalte la luz */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #f1c40f; /* Color dorado para los textos */
            cursor: default; 
        }

        /* Estilo del título superior: "Aniversario - Natasha" */
        #tituloSuperior { 
            position: absolute; 
            top: 40px; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(24px, 5vw, 36px); 
            letter-spacing: 2px;
            font-weight: 300;
            color: #d4af37; /* Oro metálico */
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.7); 
            z-index: 10; 
            pointer-events: none; 
        }

        /* Estilo del mensaje principal en el centro: "Te amo mi gordita preciosa ❤️" */
        #mensajePrincipal { 
            position: absolute; 
            top: 55%; 
            width: 100%; 
            text-align: center; 
            font-size: clamp(28px, 6vw, 48px); 
            font-weight: bold;
            color: #ffd700; /* Oro puro */
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 10px rgba(255, 77, 109, 0.5); 
            z-index: 10; 
            pointer-events: none; 
            opacity: 0; /* Empieza oculto y aparece con la música */
            transition: opacity 3s ease;
        }

        /* Estilo de la franja de "interfaz" en la parte inferior de la imagen */
        #interfazInferior {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.5); /* Sombra oscura para los controles */
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 50;
        }

        /* El botón de play dorado */
        #musicBtn { 
            position: absolute; 
            bottom: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 20px; 
            border: none; 
            border-radius: 50%; 
            background: none; 
            color: #ffd700; 
            font-size: 32px; 
            cursor: pointer; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); 
            z-index: 100; 
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        #musicBtn:hover { 
            transform: translateX(-50%) scale(1.15); 
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.9); 
        }

        /* Texto de "Empezar Nuestro Viaje 💖" */
        #textoBoton {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            color: #ffd700;
            opacity: 0.8;
            pointer-events: none;
            z-index: 100;
        }

        /* Frase inferior de "interfaz" */
        #fraseInferior {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: bold;
            letter-spacing: 1.5px;
            z-index: 100;
        }

    </style>
</head>
<body>

<div id="tituloSuperior">Aniversario - Natasha</div>
<div id="mensajePrincipal">Te amo mi gordita preciosa ❤️</div>

<div id="interfazInferior">
    <div id="fraseInferior">"Nuestro amor no tiene fin"</div>
</div>

<button id="musicBtn">▶️</button>
<div id="textoBoton">Empezar Nuestro Viaje 💖</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * =========================================
 * 2. LÓGICA DEL UNIVERSO 3D (JAVASCRIPT)
 * =========================================
 */

// --- Variables de Estado y Configuración ---
let despierto = false;
let audio, clickSound;
const particleCount = 15000; // Número de puntos de luz para los hilos

// --- Configuración Core de Three.js ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 500); // Vista general

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- 1. Creación de los "Hilos de Luz" (Ondas) ---
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

// Colores base para el oro rosa y ámbar
const colorRoseGold = new THREE.Color(0xFFB7C5); // Oro rosa suave
const colorGold = new THREE.Color(0xD4AF37); // Oro metálico

for (let i = 0; i < particleCount; i++) {
    const x = (Math.random() - 0.5) * 1200; // Ancho
    const y = (Math.random() - 0.5) * 800;  // Alto
    const z = (Math.random() - 0.5) * 300;  // Profundidad

    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;

    // Asignar color aleatorio entre oro rosa y dorado para crear la textura de la imagen
    const mixedColor = colorRoseGold.clone().lerp(colorGold, Math.random());
    colors[i * 3] = mixedColor.r;
    colors[i * 3 + 1] = mixedColor.g;
    colors[i * 3 + 2] = mixedColor.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// Material de los puntos: muy pequeño y con brillo
const material = new THREE.PointsMaterial({
    size: 2.2,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending // Para que las luces se sumen y brillen
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// --- 2. El Corazón Central de Neón (3D) ---
const heartShape = new THREE.Shape();
const xH = 0, yH = 0;
heartShape.moveTo(xH + 5, yH + 5);
heartShape.bezierCurveTo(xH + 5, yH + 5, xH + 4, yH, xH, yH);
heartShape.bezierCurveTo(xH - 6, yH, xH - 6, yH + 7, xH - 6, yH + 7);
heartShape.bezierCurveTo(xH - 6, yH + 11, xH - 3, yH + 15.4, xH + 5, yH + 19);
heartShape.bezierCurveTo(xH + 12, yH + 15.4, xH + 16, yH + 11, xH + 16, yH + 7);
heartShape.bezierCurveTo(xH + 16, yH + 7, xH + 16, yH, xH + 10, yH);
heartShape.bezierCurveTo(xH + 7, yH, xH + 5, yH + 5, xH + 5, yH + 5);

const extrudeSettings = { depth: 5, bevelEnabled: true, bevelSize: 1.5, bevelThickness: 1.5 };
const heartGeo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);

// Material para el efecto neón rosa
const heartMat = new THREE.MeshStandardMaterial({
    color: 0xff3377, // Rosa neón
    emissive: 0xff1144, // Brillo neón
    emissiveIntensity: 2.5,
    metalness: 0.3,
    roughness: 0.2,
    transparent: true,
    opacity: 0.95
});

const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.rotation.z = Math.PI; // Voltear
heartMesh.scale.set(12, 12, 12); // Grande en el centro
heartMesh.position.set(0, 40, -50); // Un poco atrás de los hilos principales
scene.add(heartMesh);

// --- 3. Iluminación y Efectos ---
const pLight = new THREE.PointLight(0xff77aa, 2, 800);
pLight.position.set(0, 50, 200);
scene.add(pLight);

const sceneLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(sceneLight);

// Raycaster para el clic en el botón (no en 3D, pero para el control)
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

/**
 * --- Gestión de Eventos y Audio ---
 */

document.getElementById("musicBtn").onclick = function() {
    // Si la música ya está sonando, no hacemos nada más
    if(audio) return;

    // Inicializar el audio de fondo y el sonido de clic
    audio = new Audio("music.mp3"); // <--- Renombra tu canción como music.mp3
    audio.loop = true;
    clickSound = new Audio("click.mp3");

    // Iniciar la música
    audio.play();

    // Efectos visuales de inicio
    this.style.opacity = "0";
    document.getElementById("textoBoton").style.opacity = "0";
    setTimeout(() => {
        this.style.display = "none";
        document.getElementById("textoBoton").style.display = "none";
        document.getElementById("mensajePrincipal").style.opacity = "1";
    }, 1000);

    // Activamos la animación
    despierto = true;
};

// Controlar el movimiento del mouse para interactuar
window.addEventListener("pointermove", (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

/**
 * --- Bucle de Animación (60 FPS) ---
 */
function animate() {
    requestAnimationFrame(animate);

    // Si la música no ha empezado, el universo está quieto
    if(despierto) {
        const t = Date.now() * 0.001;

        // --- 1. Animación de los Hilos de Luz (De tu código recomendado) ---
        // Crear ondas suaves en los puntos de luz usando matemáticas
        const positions = points.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            const x = positions[i * 3];
            const y = positions[i * 3 + 1];

            // La fórmula de la onda: senos y cosenos para movimiento fluido
            positions[i * 3 + 2] = Math.sin(x * 0.01 + t) * Math.cos(y * 0.01 + t * 0.5) * 50;
        }
        points.geometry.attributes.position.needsUpdate = true;

        // Suave rotación del conjunto de puntos
        points.rotation.y += 0.0001;
        points.rotation.x = Math.sin(t * 0.1) * 0.02;

        // --- 2. Animación del Corazón Latido ---
        // Latido suave sincronizado con el tiempo
        const pulseFactor = Math.sin(t * 3) * Math.sin(t * 3); // De 0 a 1 suave
        const baseScale = 12;
        heartMesh.scale.setScalar(baseScale + pulseFactor * 0.6); // Escala
        heartMat.emissiveIntensity = 2.0 + pulseFactor * 1.5; // Brillo neón
        heartMesh.rotation.y += 0.005; // Rotación suave y romántica

    }

    renderer.render(scene, camera);
}

// Controlar el redimensionado de la ventana
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Iniciar animación
animate();

</script>
</body>
</html>
