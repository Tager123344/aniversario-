<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El Universo Sabe 💖</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

#btn {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    background: #ff3d8b;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

#texto {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 30px;
    opacity: 0;
    transition: 1.5s;
}
</style>
</head>

<body>

<div id="texto"></div>
<button id="btn">✨ Pregúntale al universo ✨</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let escena = new THREE.Scene();
let camara = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,2000);
camara.position.z = 600;

let render = new THREE.WebGLRenderer();
render.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(render.domElement);

// estrellas
let geo = new THREE.BufferGeometry();
let arr = [];

for(let i=0;i<8000;i++){
    arr.push(
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000
    );
}

geo.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));
let mat = new THREE.PointsMaterial({color:0xffffff});
let estrellas = new THREE.Points(geo,mat);
escena.add(estrellas);

// audio
let audio = new Audio("music.mp3");

let secuencia = [
    "¿Quién es lo más importante en mi vida?",
    "...",
    "Natasha 💖",
    "¿Quién cambió mi mundo?",
    "...",
    "Tú ✨",
    "¿A quién amo con todo mi corazón?",
    "...",
    "A ti ❤️",
    "Feliz aniversario mi amor 💕"
];

let i = 0;

document.getElementById("btn").onclick = ()=>{
    audio.play();
    document.getElementById("btn").style.display = "none";
    siguiente();
};

function siguiente(){
    if(i >= secuencia.length) return;

    let t = document.getElementById("texto");
    t.innerHTML = secuencia[i];
    t.style.opacity = 1;

    setTimeout(()=>{
        t.style.opacity = 0;
        i++;
        setTimeout(siguiente,1500);
    },3000);
}

// explosión final
function explosion(){
    estrellas.material.color.setHex(0xff4da6);
    estrellas.scale.set(2,2,2);
}

// animación
function animar(){
    requestAnimationFrame(animar);

    estrellas.rotation.y += 0.001;

    if(i >= secuencia.length){
        explosion();
    }

    render.render(escena,camara);
}

animar();

</script>
</body>
</html>
