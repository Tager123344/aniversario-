<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra Historia 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

#texto {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 32px;
    color: white;
    opacity: 0;
    transition: 2s;
}
</style>
</head>

<body>

<div id="texto"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// escena
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,5000);
camera.position.z = 1000;

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// estrellas
let starsGeo = new THREE.BufferGeometry();
let arr = [];

for(let i=0;i<15000;i++){
    arr.push(
        (Math.random()-0.5)*4000,
        (Math.random()-0.5)*4000,
        (Math.random()-0.5)*4000
    );
}

starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));
let starsMat = new THREE.PointsMaterial({color:0xffffff, size:1});
let stars = new THREE.Points(starsGeo,starsMat);
scene.add(stars);

// luz (ella)
let luzGeo = new THREE.SphereGeometry(20,32,32);
let luzMat = new THREE.MeshBasicMaterial({color:0xff4da6});
let luz = new THREE.Mesh(luzGeo,luzMat);
luz.visible = false;
scene.add(luz);

// corazón
let heartGeo = new THREE.SphereGeometry(100,32,32);
let heartMat = new THREE.MeshBasicMaterial({color:0xff3366});
let heart = new THREE.Mesh(heartGeo,heartMat);
heart.visible = false;
scene.add(heart);

// audio
let audio = new Audio("music.mp3");
audio.play();

// texto
let frases = [
    "Antes de ti...",
    "Todo era vacío...",
    "Hasta que apareciste tú...",
    "Y cambiaste mi universo...",
    "Lo llenaste de luz...",
    "Y de amor...",
    "Desde entonces...",
    "Todo eres tú...",
    "Feliz aniversario 💖",
    "30/10/2025 ❤️"
];

let i = 0;

function mostrar(){
    if(i>=frases.length) return;

    let t = document.getElementById("texto");
    t.innerHTML = frases[i];
    t.style.opacity = 1;

    setTimeout(()=>{
        t.style.opacity = 0;
        i++;
        setTimeout(mostrar,2000);
    },4000);
}

setTimeout(mostrar,1000);

// timeline animación
function animate(){
    requestAnimationFrame(animate);

    let time = Date.now()*0.001;

    stars.rotation.y += 0.0005;

    // escena progresiva
    if(i > 2){
        luz.visible = true;
        luz.position.x = Math.sin(time)*200;
    }

    if(i > 4){
        heart.visible = true;
        heart.scale.x += 0.01;
        heart.scale.y += 0.01;
    }

    if(i > 6){
        camera.position.z -= 1; // zoom emocional
    }

    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
