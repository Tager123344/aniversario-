<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felices 5 Meses</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a-scene>
        <a-sky color="#FFB6C1"></a-sky>

        <a-text value="Felices 5 Meses, mi amor\n(30 de Octubre - 30 de Marzo)"
                align="center"
                position="0 2.5 -3"
                color="#8B0000"
                scale="1.2 1.2 1.2"
                font="kelsonsans"
                animation="property: position; to: 0 2.7 -3; dir: alternate; dur: 2000; loop: true">
        </a-text>

        <a-plane position="0 0 -4" rotation="-90 0 0" width="15" height="15" color="#7BC8A4"></a-plane>

        <a-sphere position="-2 1 -3" radius="0.3" color="#FF69B4" animation="property: position; to: -2 1.5 -3; dir: alternate; dur: 1500; loop: true"></a-sphere>
        <a-sphere position="2 1.2 -4" radius="0.4" color="#FF1493" animation="property: position; to: 2 1.8 -4; dir: alternate; dur: 1200; loop: true"></a-sphere>

        <a-cylinder position="-1.5 0.2 -2.5" radius="0.08" height="0.4" color="#F5F5DC"></a-cylinder>
        <a-sphere position="-1.5 0.45 -2.5" radius="0.25" color="#FF3333"></a-sphere>

        <a-cylinder position="1.2 0.15 -2" radius="0.06" height="0.3" color="#F5F5DC"></a-cylinder>
        <a-sphere position="1.2 0.35 -2" radius="0.2" color="#FF3333"></a-sphere>

        <a-cylinder position="0.5 0.2 -4.5" radius="0.1" height="0.4" color="#F5F5DC"></a-cylinder>
        <a-sphere position="0.5 0.5 -4.5" radius="0.3" color="#FF3333"></a-sphere>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
</body>
</html>
