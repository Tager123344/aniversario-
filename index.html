<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aniversario - Natasha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'serif'; }
        #titulo { position: absolute; top: 30px; width: 100%; text-align: center; color: #d4af37; font-size: 28px; letter-spacing: 4px; text-shadow: 0 0 10px rgba(212,175,55,0.5); z-index: 10; pointer-events: none; }
        #mensaje { position: absolute; bottom: 25%; width: 100%; text-align: center; color: #ffd700; font-size: 35px; text-shadow: 0 0 20px #ff4d6d; opacity: 0; transition: 3s; z-index: 10; font-weight: bold; }
        #btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: none; border: 2px solid #d4af37; color: #d4af37; font-size: 20px; cursor: pointer; border-radius: 50px; z-index: 100; box-shadow: 0 0 20px #d4af37; transition: 0.5s; }
        #btn:hover { background: #d4af37; color: black; box-shadow: 0 0 40px #ffd700; }
    </style>
</head>
<body>

<div id="titulo">ANIVERSARIO - NATASHA</div>
<div id="mensaje">Te amo mi gordita preciosa ❤️</div>
<button id="btn" onclick="iniciar()">Empezar Nuestro Viaje 💖</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/shaders/LuminosityHighPassShader.js"></script>

<script>
let audio, despierto = false;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.z = 400;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

// --- CONFIGURACIÓN DEL BRILLO (BLOOM) ---
const renderScene = new THREE.RenderPass(scene, camera);
const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
bloomPass.threshold = 0.1;
bloomPass.strength = 1.2; // Intensidad del brillo
bloomPass.radius = 0.5;

const composer = new THREE.EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// --- CREACIÓN DE HILOS (40,000 partículas para densidad) ---
const count = 40000;
const geometry = new THREE.BufferGeometry();
const pos = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);
const color1 = new THREE.Color(0xffb7c5); // Rose Gold
const color2 = new THREE.Color(0xffd700); // Oro

for(let i=0; i<count; i++) {
    pos[i*3] = (Math.random() - 0.5) * 1000;
    pos[i*3+1] = (Math.random() - 0.5) * 600;
    pos[i*3+2] = (Math.random() - 0.5) * 400;
    
    let mix = color1.clone().lerp(color2, Math.random());
    colors[i*3] = mix.r; colors[i*3+1] = mix.g; colors[i*3+2] = mix.b;
}
geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
const points = new THREE.Points(geometry, material);
scene.add(points);

// --- CORAZÓN CENTRAL ---
const heartShape = new THREE.Shape();
heartShape.moveTo(0,0); heartShape.bezierCurveTo(0,0,-5,10,0,20); heartShape.bezierCurveTo(5,30,20,15,20,15); heartShape.bezierCurveTo(20,15,35,30,40,20); heartShape.bezierCurveTo(45,10,40,0,40,0); heartShape.bezierCurveTo(40,0,40,-15,20,-30); heartShape.bezierCurveTo(0,-15,0,0,0,0);

const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 2, bevelEnabled: true, bevelSize: 2 });
const heartMat = new THREE.MeshStandardMaterial({ color: 0xff4d6d, emissive: 0xff0044, emissiveIntensity: 5 });
const heart = new THREE.Mesh(heartGeo, heartMat);
heart.rotation.x = Math.PI;
heart.scale.set(4, 4, 4);
heart.position.set(-80, 50, 0);
scene.add(heart);

// Lógica de inicio
function iniciar() {
    audio = new Audio("music.mp3");
    audio.play();
    document.getElementById('btn').style.display = 'none';
    document.getElementById('mensaje').style.opacity = '1';
    despierto = true;
}

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.0005;

    if(despierto) {
        // Movimiento de ondas como seda
        const p = points.geometry.attributes.position.array;
        for(let i=0; i<count; i++) {
            const x = p[i*3];
            const y = p[i*3+1];
            p[i*3+2] = Math.sin(x*0.01 + time*2) * Math.cos(y*0.01 + time) * 40;
        }
        points.geometry.attributes.position.needsUpdate = true;
        
        // Latido y rotación
        heart.scale.setScalar(4 + Math.sin(time*10)*0.2);
        heart.rotation.y += 0.01;
    }
    
    composer.render(); // Usamos el composer para el brillo
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
