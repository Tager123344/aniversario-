<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Audio Test</title>
</head>

<body style="background:black; color:white; text-align:center;">

<h1>💖 Prueba de música 💖</h1>

<audio id="audio" src="music.mp3"></audio>

<button onclick="playMusic()" style="padding:20px; font-size:20px;">
▶️ Reproducir
</button>

<script>
function playMusic(){
    let audio = document.getElementById("audio");
    audio.play().then(()=>{
        alert("✅ Música funcionando");
    }).catch(e=>{
        alert("❌ Error: " + e);
    });
}
</script>

</body>
</html>
